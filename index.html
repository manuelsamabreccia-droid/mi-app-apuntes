<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>App de Apuntes Pro - V2</title>
  <style>
    body {
      margin: 0; font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
      overflow: hidden; height: 100vh;
    }

    /* PANTALLA DE INICIO / LOGIN */
    #login-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 2000;
    }
    .login-box {
      background: white; padding: 40px; border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
    }
    input[type="text"], input[type="password"] {
      padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; width: 250px;
    }

    /* BARRA DE HERRAMIENTAS ARRASTRABLE */
    #toolbar {
      position: fixed; top: 20px; left: 20px;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
      padding: 5px 15px; border-radius: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      z-index: 1000; cursor: grab; display: flex; align-items: center;
      border: 1px solid rgba(255,255,255,0.3);
    }
    #toolbar:active { cursor: grabbing; }
    .drag-handle { margin-right: 10px; color: #999; cursor: grab; }

    button {
      border: none; margin: 5px; padding: 10px 15px;
      border-radius: 15px; cursor: pointer; background: white;
      transition: 0.2s; font-weight: 500;
    }
    button:hover { background: #f0f0f0; transform: translateY(-2px); }
    .btn-save { background: #4CAF50; color: white; }
    .btn-logout { background: #ff4d4d; color: white; }

    /* MENU CONTEXTUAL (CLICK DERECHO) */
    #context-menu {
      position: fixed; background: white; border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: none; z-index: 3000;
      padding: 5px 0; min-width: 120px;
    }
    .menu-item {
      padding: 10px 20px; cursor: pointer; transition: 0.2s;
    }
    .menu-item:hover { background: #ff4d4d; color: white; }

    /* CANVAS Y BLOQUES */
    #canvas { width: 100vw; height: 100vh; position: relative; display: none; }
    .block {
      position: absolute; padding: 10px; min-width: 140px; min-height: 90px;
      cursor: move; box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      transition: transform 0.1s;
    }
    .square { background: #ffffff; border-radius: 12px; }
    .circle { background: #ffd6e0; border-radius: 50%; display: flex; align-items: center; }
    textarea {
      width: 100%; height: 80px; border: none; outline: none;
      background: transparent; resize: none; font-size: 14px;
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>Mis Apuntes Pro</h2>
    <input type="text" id="username" placeholder="Nombre de usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <br>
    <button onclick="login()" class="btn-save">Entrar / Crear Cuenta</button>
  </div>
</div>

<div id="context-menu">
  <div class="menu-item" onclick="deleteSelected()">🗑️ Borrar elemento</div>
</div>

<div id="toolbar">
  <span class="drag-handle">⠿</span>
  <button onclick="addBlock('square')">🟦 Cuadro</button>
  <button onclick="addBlock('circle')">⚪ Círculo</button>
  <button onclick="saveNotes()" class="btn-save">💾 Guardar</button>
  <button onclick="logout()" class="btn-logout">Salir</button>
</div>

<div id="canvas"></div>

<script>
  let currentUser = null;
  let elementToDelete = null;
  const canvas = document.getElementById("canvas");
  const toolbar = document.getElementById("toolbar");
  const contextMenu = document.getElementById("context-menu");

  // --- 1. SISTEMA DE LOGIN ---
  function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    if(!user || !pass) return alert("Completa los datos");

    currentUser = user;
    document.getElementById("login-screen").style.display = "none";
    canvas.style.display = "block";
    loadNotes();
  }

  function logout() {
    location.reload();
  }

  // --- 2. BARRA DE HERRAMIENTAS ARRASTRABLE ---
  let tbDragging = false;
  let tbX, tbY;

  toolbar.addEventListener("mousedown", (e) => {
    if(e.target.tagName === 'BUTTON') return;
    tbDragging = true;
    tbX = e.clientX - toolbar.offsetLeft;
    tbY = e.clientY - toolbar.offsetTop;
  });

  document.addEventListener("mousemove", (e) => {
    if(!tbDragging) return;
    toolbar.style.left = (e.clientX - tbX) + "px";
    toolbar.style.top = (e.clientY - tbY) + "px";
    toolbar.style.transform = "none"; // Quitar centrado inicial
  });

  document.addEventListener("mouseup", () => tbDragging = false);

  // --- 3. CLICK DERECHO (BORRAR) ---
  window.addEventListener("contextmenu", (e) => {
    const block = e.target.closest(".block");
    if(block) {
      e.preventDefault();
      elementToDelete = block;
      contextMenu.style.display = "block";
      contextMenu.style.left = e.clientX + "px";
      contextMenu.style.top = e.clientY + "px";
    } else {
      contextMenu.style.display = "none";
    }
  });

  window.onclick = () => contextMenu.style.display = "none";

  function deleteSelected() {
    if(elementToDelete) {
      elementToDelete.remove();
      saveNotes();
    }
  }

  // --- 4. GESTIÓN DE NOTAS ---
  function addBlock(type) {
    createBlock({
      type: type, x: "150px", y: "150px",
      html: `<textarea placeholder="Escribí..."></textarea>`
    });
  }

  function createBlock(data) {
    let el = document.createElement("div");
    el.className = `block ${data.type}`;
    el.dataset.type = data.type;
    el.style.left = data.x;
    el.style.top = data.y;
    el.innerHTML = data.html;

    makeDraggable(el);
    canvas.appendChild(el);

    let txt = el.querySelector("textarea");
    if(txt) {
      txt.value = txt.innerHTML; // Cargar texto previo si existe
      txt.oninput = () => { txt.innerHTML = txt.value; };
    }
  }

  function makeDraggable(el) {
    let ox, oy, isD = false;
    el.addEventListener("mousedown", (e) => {
      if(e.target.tagName === "TEXTAREA") return;
      isD = true;
      ox = e.clientX - el.offsetLeft;
      oy = e.clientY - el.offsetTop;
      document.querySelectorAll(".block").forEach(b => b.style.zIndex = 1);
      el.style.zIndex = 2;
    });
    document.addEventListener("mousemove", (e) => {
      if(!isD) return;
      el.style.left = (e.clientX - ox) + "px";
      el.style.top = (e.clientY - oy) + "px";
    });
    document.addEventListener("mouseup", () => { isD = false; });
  }

  function saveNotes() {
    let data = [];
    document.querySelectorAll(".block").forEach(el => {
      data.push({
        type: el.dataset.type,
        html: el.innerHTML,
        x: el.style.left,
        y: el.style.top
      });
    });
    // Guardamos bajo una llave única por usuario
    localStorage.setItem("notes_" + currentUser, JSON.stringify(data));
    alert("¡Apuntes guardados!");
  }

  function loadNotes() {
    let saved = localStorage.getItem("notes_" + currentUser);
    if(saved) {
      canvas.innerHTML = "";
      JSON.parse(saved).forEach(createBlock);
    }
  }
</script>
</body>
</html>
