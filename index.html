<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apuntes Pro V7</title>
<style>
:root{
  --bg:#f4f6fb;
  --toolbar:#ffffffee;
  --primary:#4f46e5;
  --border:#d9dce5;
  --text:#222;
}
*{box-sizing:border-box}
body{
  margin:0;
  overflow:hidden;
  font-family:Segoe UI,sans-serif;
  background:linear-gradient(135deg,#eef2ff,#dbeafe);
  color:var(--text);
}

#canvas-wrapper{
  width:100vw;
  height:100vh;
  overflow:auto;
  position:relative;
}

#canvas{
  position:relative;
  width:5000px;
  height:5000px;
}

#svg-layer{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.block{
  position:absolute;
  min-width:120px;
  min-height:70px;
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:move;
  border:2px solid transparent;
  resize:both;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.block.selected{
  border:2px dashed var(--primary);
}

.shape-rect{
  border-radius:14px;
  background:white;
}

.shape-circle{
  width:160px;
  height:160px;
  border-radius:50%;
  background:white;
  resize:none;
}

.shape-diamond{
  width:140px;
  height:140px;
  transform:rotate(45deg);
  background:white;
}

.shape-diamond textarea{
  transform:rotate(-45deg);
  width:140%;
  height:140%;
}

.shape-postit{
  background:#fff176;
  border-radius:0 0 22px 0;
}

.shape-text{
  background:transparent;
  box-shadow:none;
  border:1px dashed rgba(0,0,0,.2);
  resize:none;
}

textarea{
  width:100%;
  height:100%;
  border:none;
  background:transparent;
  resize:none;
  outline:none;
  text-align:center;
  font-size:16px;
  font-family:Segoe UI,sans-serif;
  overflow:hidden;
}

.anchor{
  width:12px;
  height:12px;
  background:var(--primary);
  border-radius:50%;
  position:absolute;
  display:none;
}

.block:hover .anchor{
  display:block;
}

.anchor.top{top:-6px;left:50%;transform:translateX(-50%)}
.anchor.bottom{bottom:-6px;left:50%;transform:translateX(-50%)}
.anchor.left{left:-6px;top:50%;transform:translateY(-50%)}
.anchor.right{right:-6px;top:50%;transform:translateY(-50%)}

#toolbar{
  position:fixed;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  background:var(--toolbar);
  backdrop-filter:blur(10px);
  border:1px solid var(--border);
  border-radius:16px;
  display:flex;
  gap:8px;
  padding:10px;
  z-index:9999;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
  transition:.2s;
}

#toolbar.vertical{
  flex-direction:column;
}

.tool-group{
  display:flex;
  gap:6px;
  align-items:center;
}

button,select,input{
  border:none;
  padding:8px 10px;
  border-radius:10px;
  background:white;
  cursor:pointer;
  border:1px solid var(--border);
}

button:hover{
  background:#eef2ff;
}

#toggle-toolbar{
  position:fixed;
  top:10px;
  right:10px;
  z-index:10000;
}

.context-menu{
  position:fixed;
  background:white;
  border-radius:12px;
  border:1px solid var(--border);
  box-shadow:0 10px 20px rgba(0,0,0,.15);
  overflow:hidden;
  display:none;
  z-index:20000;
}

.context-menu button{
  width:100%;
  border:none;
  border-radius:0;
  text-align:left;
}

#document-view{
  position:fixed;
  inset:0;
  background:#eceff5;
  display:none;
  justify-content:center;
  overflow:auto;
  padding:90px 0;
  z-index:8000;
}

#document-editor{
  width:850px;
  min-height:1200px;
  background:white;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
  padding:50px;
  outline:none;
  line-height:1.7;
}

.guide{
  position:absolute;
  background:red;
  z-index:5000;
  pointer-events:none;
  display:none;
}

#guide-v{
  width:2px;
  height:5000px;
}

#guide-h{
  height:2px;
  width:5000px;
}

</style>
</head>
<body>

<div id="guide-v" class="guide"></div>
<div id="guide-h" class="guide"></div>

<button id="toggle-toolbar">⬅</button>

<div id="toolbar">

<div class="tool-group">
<select id="shape-selector">
<option value="shape-rect">Rectángulo</option>
<option value="shape-circle">Círculo</option>
<option value="shape-diamond">Rombo</option>
<option value="shape-postit">Post-it</option>
<option value="shape-text">Texto Libre</option>
</select>
<button onclick="createShape()">➕ Crear</button>
</div>

<div class="tool-group">
<select id="layout-selector">
<option value="mindmap">Mapa Mental</option>
<option value="hierarchy">Esquema</option>
<option value="timeline">Timeline</option>
</select>
<button onclick="applyLayout()">📚 Organizar</button>
</div>

<div class="tool-group">
<select id="font-family">
<option>Segoe UI</option>
<option>Arial</option>
<option>Times New Roman</option>
<option>Courier New</option>
<option>Comic Sans MS</option>
</select>

<select id="font-size">
<option>12</option>
<option selected>16</option>
<option>20</option>
<option>28</option>
<option>40</option>
</select>

<button onclick="formatText('bold')"><b>N</b></button>
<button onclick="formatText('italic')"><i>K</i></button>
<input type="color" id="bg-picker">
<input type="color" id="text-picker" value="#000000">
</div>

<div class="tool-group">
<button onclick="toggleDocumentMode()">📝 Texto</button>
<button onclick="saveProject()">💾 Guardar</button>
</div>

</div>

<div id="canvas-wrapper">
<div id="canvas">
<svg id="svg-layer"></svg>
</div>
</div>

<div id="document-view">
<div id="document-editor" contenteditable="true"></div>
</div>

<div class="context-menu" id="context-menu">
<button onclick="bringToFront()">Traer al frente</button>
<button onclick="sendToBack()">Enviar atrás</button>
<button onclick="deleteSelected()">Eliminar</button>
</div>

<script>
const canvas=document.getElementById('canvas');
const canvasWrapper=document.getElementById('canvas-wrapper');
const svg=document.getElementById('svg-layer');
const contextMenu=document.getElementById('context-menu');

let selected=null;
let blocks=[];
let connections=[];
let zCounter=1;
let currentConnection=null;
let toolbarHidden=false;

function createShape(){
  const type=document.getElementById('shape-selector').value;

  const block=document.createElement('div');
  block.className=`block ${type}`;
  block.style.left=(canvasWrapper.scrollLeft+300)+'px';
  block.style.top=(canvasWrapper.scrollTop+250)+'px';
  block.style.zIndex=++zCounter;

  const ta=document.createElement('textarea');
  ta.placeholder='Escribir...';
  block.appendChild(ta);

  addAnchors(block);
  canvas.appendChild(block);
  blocks.push(block);

  initBlock(block);
}

function addAnchors(block){
  ['top','bottom','left','right'].forEach(pos=>{
    const a=document.createElement('div');
    a.className=`anchor ${pos}`;

    a.addEventListener('mousedown',(e)=>{
      e.stopPropagation();
      startConnection(block,e);
    });

    block.appendChild(a);
  });
}

function startConnection(block,e){
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('stroke','#555');
  path.setAttribute('fill','none');
  path.setAttribute('stroke-width','3');
  svg.appendChild(path);

  currentConnection={
    from:block,
    path
  };

  document.addEventListener('mousemove',moveConnection);
  document.addEventListener('mouseup',finishConnection);
}

function moveConnection(e){
  if(!currentConnection)return;

  const fromRect=currentConnection.from.getBoundingClientRect();

  const x1=fromRect.left+fromRect.width/2+canvasWrapper.scrollLeft;
  const y1=fromRect.top+fromRect.height/2+canvasWrapper.scrollTop;

  const x2=e.clientX+canvasWrapper.scrollLeft;
  const y2=e.clientY+canvasWrapper.scrollTop;

  currentConnection.path.setAttribute('d',`M ${x1} ${y1} L ${x2} ${y2}`);
}

function finishConnection(e){
  document.removeEventListener('mousemove',moveConnection);
  document.removeEventListener('mouseup',finishConnection);

  const target=document.elementFromPoint(e.clientX,e.clientY);
  const block=target?.closest('.block');

  if(block && block!==currentConnection.from){
    connections.push({
      from:currentConnection.from,
      to:block,
      path:currentConnection.path,
      type:'free'
    });
    redrawConnections();
  }else{
    currentConnection.path.remove();
  }

  currentConnection=null;
}

function redrawConnections(){
  connections.forEach(c=>{
    const r1=c.from.getBoundingClientRect();
    const r2=c.to.getBoundingClientRect();

    const x1=r1.left+r1.width/2+canvasWrapper.scrollLeft;
    const y1=r1.top+r1.height/2+canvasWrapper.scrollTop;

    const x2=r2.left+r2.width/2+canvasWrapper.scrollLeft;
    const y2=r2.top+r2.height/2+canvasWrapper.scrollTop;

    c.path.setAttribute('d',`M ${x1} ${y1} L ${x2} ${y2}`);
  });
}

function initBlock(block){
  let dragging=false;
  let ox=0;
  let oy=0;

  block.addEventListener('mousedown',(e)=>{
    if(e.target.classList.contains('anchor'))return;
    if(e.target.tagName==='TEXTAREA')return;

    dragging=true;
    selected=block;
    selectBlock(block);

    block.style.zIndex=++zCounter;

    const rect=block.getBoundingClientRect();
    ox=e.clientX-rect.left;
    oy=e.clientY-rect.top;
  });

  document.addEventListener('mousemove',(e)=>{
    if(!dragging)return;

    let x=e.clientX-ox+canvasWrapper.scrollLeft;
    let y=e.clientY-oy+canvasWrapper.scrollTop;

    smartGuides(block,x,y);

    block.style.left=x+'px';
    block.style.top=y+'px';

    redrawConnections();
  });

  document.addEventListener('mouseup',()=>{
    dragging=false;
    hideGuides();
  });

  block.addEventListener('click',()=>{
    selected=block;
    selectBlock(block);
  });

  block.addEventListener('contextmenu',(e)=>{
    e.preventDefault();
    selected=block;
    selectBlock(block);

    contextMenu.style.display='block';
    contextMenu.style.left=e.clientX+'px';
    contextMenu.style.top=e.clientY+'px';
  });

  const ta=block.querySelector('textarea');

  ta.addEventListener('input',()=>{
    ta.style.fontFamily=document.getElementById('font-family').value;
    ta.style.fontSize=document.getElementById('font-size').value+'px';
  });
}

function smartGuides(block,x,y){
  const gv=document.getElementById('guide-v');
  const gh=document.getElementById('guide-h');

  let foundV=false;
  let foundH=false;

  blocks.forEach(other=>{
    if(other===block)return;

    const ox=parseFloat(other.style.left);
    const oy=parseFloat(other.style.top);

    if(Math.abs(x-ox)<15){
      x=ox;
      foundV=true;
      gv.style.left=x+'px';
      gv.style.display='block';
    }

    if(Math.abs(y-oy)<15){
      y=oy;
      foundH=true;
      gh.style.top=y+'px';
      gh.style.display='block';
    }
  });

  if(!foundV)gv.style.display='none';
  if(!foundH)gh.style.display='none';
}

function hideGuides(){
  document.getElementById('guide-v').style.display='none';
  document.getElementById('guide-h').style.display='none';
}

function selectBlock(block){
  document.querySelectorAll('.block').forEach(b=>b.classList.remove('selected'));
  block.classList.add('selected');
}

function formatText(type){
  if(!selected)return;

  const ta=selected.querySelector('textarea');

  if(type==='bold'){
    ta.style.fontWeight=ta.style.fontWeight==='bold'?'normal':'bold';
  }

  if(type==='italic'){
    ta.style.fontStyle=ta.style.fontStyle==='italic'?'normal':'italic';
  }

  ta.style.fontFamily=document.getElementById('font-family').value;
  ta.style.fontSize=document.getElementById('font-size').value+'px';

  selected.style.background=document.getElementById('bg-picker').value;
  ta.style.color=document.getElementById('text-picker').value;
}

function deleteSelected(){
  if(!selected)return;

  connections=connections.filter(c=>{
    if(c.from===selected || c.to===selected){
      c.path.remove();
      return false;
    }
    return true;
  });

  selected.remove();
  blocks=blocks.filter(b=>b!==selected);
  contextMenu.style.display='none';
}

function bringToFront(){
  if(selected)selected.style.zIndex=++zCounter;
}

function sendToBack(){
  if(selected)selected.style.zIndex=1;
}

window.addEventListener('click',()=>{
  contextMenu.style.display='none';
});

function applyLayout(){
  const type=document.getElementById('layout-selector').value;

  if(blocks.length<2)return;

  const root=blocks[0];
  const children=blocks.slice(1);

  const rx=parseFloat(root.style.left);
  const ry=parseFloat(root.style.top);

  if(type==='mindmap'){
    const radius=300;
    const step=(Math.PI*2)/children.length;

    children.forEach((b,i)=>{
      const x=rx+Math.cos(step*i)*radius;
      const y=ry+Math.sin(step*i)*radius;

      b.style.left=x+'px';
      b.style.top=y+'px';
    });
  }

  if(type==='hierarchy'){
    let start=rx-children.length*120;

    children.forEach(b=>{
      b.style.left=start+'px';
      b.style.top=(ry+220)+'px';
      start+=240;
    });
  }

  if(type==='timeline'){
    let start=rx;

    children.forEach(b=>{
      b.style.left=start+'px';
      b.style.top=ry+'px';
      start+=260;
    });
  }

  redrawConnections();
}

function toggleDocumentMode(){
  const doc=document.getElementById('document-view');

  if(doc.style.display==='flex'){
    doc.style.display='none';
  }else{
    doc.style.display='flex';
  }
}

function saveProject(){
  const data={
    blocks:blocks.map(b=>({
      html:b.outerHTML,
      left:b.style.left,
      top:b.style.top,
      z:b.style.zIndex
    })),
    document:document.getElementById('document-editor').innerHTML
  };

  localStorage.setItem('apuntes-pro-v7',JSON.stringify(data));
  alert('Proyecto guardado');
}

function loadProject(){
  const saved=JSON.parse(localStorage.getItem('apuntes-pro-v7'));
  if(!saved)return;

  document.getElementById('document-editor').innerHTML=saved.document||'';

  saved.blocks.forEach(item=>{
    const temp=document.createElement('div');
    temp.innerHTML=item.html;

    const block=temp.firstElementChild;

    canvas.appendChild(block);
    blocks.push(block);

    initBlock(block);

    block.querySelectorAll('.anchor').forEach(a=>{
      a.addEventListener('mousedown',(e)=>{
        e.stopPropagation();
        startConnection(block,e);
      });
    });
  });
}

loadProject();

const toolbar=document.getElementById('toolbar');

let toolbarDrag=false;
let tx=0;
let ty=0;

toolbar.addEventListener('mousedown',(e)=>{
  if(e.target.tagName==='BUTTON' || e.target.tagName==='SELECT' || e.target.tagName==='INPUT')return;

  toolbarDrag=true;

  tx=e.clientX-toolbar.offsetLeft;
  ty=e.clientY-toolbar.offsetTop;
});

window.addEventListener('mousemove',(e)=>{
  if(!toolbarDrag)return;

  toolbar.style.left=(e.clientX-tx)+'px';
  toolbar.style.top=(e.clientY-ty)+'px';
  toolbar.style.transform='none';

  if(toolbar.offsetLeft<200 || toolbar.offsetLeft>window.innerWidth-200){
    toolbar.classList.add('vertical');
  }else{
    toolbar.classList.remove('vertical');
  }
});

window.addEventListener('mouseup',()=>toolbarDrag=false);

const toggleBtn=document.getElementById('toggle-toolbar');

toggleBtn.addEventListener('click',()=>{
  toolbarHidden=!toolbarHidden;

  if(toolbarHidden){
    toolbar.style.display='none';
    toggleBtn.innerHTML='➡';
  }else{
    toolbar.style.display='flex';
    toggleBtn.innerHTML='⬅';
  }
});

</script>
</body>
</html>
