<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Apuntes Pro V3 - Studio</title>
  <style>
    body {
      margin: 0; font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      overflow: hidden; height: 100vh; user-select: none;
    }

    /* PANTALLAS (Login y Dashboard) */
    .screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(15px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 2000; transition: 0.3s;
    }
    .hidden { display: none !important; }
    
    .box {
      background: white; padding: 40px; border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 80%;
    }
    input[type="text"] { padding: 12px; margin: 10px; border: 1px solid #ddd; border-radius: 10px; width: 250px; }
    
    .project-grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 20px;}
    .project-card {
      padding: 20px; background: #e0c3fc; border-radius: 15px; cursor: pointer;
      font-weight: bold; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .project-card:hover { transform: translateY(-5px); background: #d0a3fc; }

    /* BARRA DE HERRAMIENTAS ADAPTABLE */
    #toolbar-container {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
      border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.15);
      z-index: 1000; border: 1px solid rgba(0,0,0,0.05);
      display: flex; align-items: center; transition: width 0.3s, height 0.3s;
    }
    
    .toolbar { display: flex; align-items: center; padding: 5px 10px; gap: 5px;}
    /* Clases para orientación */
    .horizontal .toolbar { flex-direction: row; }
    .vertical .toolbar { flex-direction: column; }
    
    /* Estado colapsado */
    .collapsed .toolbar { display: none; }
    .collapsed { padding: 10px !important; border-radius: 50% !important; }

    .drag-handle { padding: 10px; cursor: grab; color: #aaa; font-size: 20px; }
    .drag-handle:active { cursor: grabbing; }
    
    .btn-toggle {
      background: transparent; border: none; font-size: 18px; cursor: pointer;
      color: #555; padding: 10px; border-radius: 50%;
    }
    .btn-toggle:hover { background: #eee; }

    button {
      border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer;
      background: white; transition: 0.2s; font-weight: 500; font-size: 13px;
    }
    button:hover { background: #f0f0f0; }
    .btn-action { background: #4CAF50; color: white; }
    .btn-danger { background: #ff4d4d; color: white; }
    input[type="color"] { border: none; border-radius: 5px; width: 30px; height: 30px; cursor: pointer; }

    /* CANVAS, BLOQUES Y LÍNEAS */
    #canvas { width: 100vw; height: 100vh; position: relative; }
    #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    
    .block {
      position: absolute; padding: 15px; min-width: 120px; min-height: 80px;
      cursor: move; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      z-index: 1; border: 2px solid transparent;
    }
    /* Formas */
    .square { border-radius: 10px; }
    .circle { border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 30px;}
    .diamond { transform: rotate(45deg); display: flex; align-items: center; justify-content: center; }
    .diamond textarea { transform: rotate(-45deg); } /* Desrotar texto */

    textarea {
      width: 100%; height: 100%; border: none; outline: none; background: transparent;
      resize: none; font-size: 14px; text-align: center; font-family: inherit;
    }
    
    .connecting-mode { cursor: crosshair !important; border: 2px dashed #4CAF50 !important; }

  </style>
</head>
<body>

<div id="login-screen" class="screen">
  <div class="box">
    <h2>Bienvenido a Apuntes Pro</h2>
    <p>Ingresa un nombre para tu dispositivo</p>
    <input type="text" id="username" placeholder="Ej: Mi PC, Juan...">
    <br><button class="btn-action" onclick="login()">Continuar</button>
  </div>
</div>

<div id="dashboard-screen" class="screen hidden">
  <div class="box" style="background: transparent; box-shadow: none;">
    <h2 id="user-greeting">Tus Proyectos</h2>
    <button class="btn-action" onclick="createNewProject()">+ Nuevo Apunte</button>
    <button class="btn-danger" onclick="logout()">Cambiar Usuario</button>
    <div id="project-list" class="project-grid"></div>
  </div>
</div>

<div id="toolbar-container" class="horizontal hidden">
  <button class="btn-toggle" onclick="toggleToolbar()">↕</button>
  <div class="drag-handle">⠿</div>
  
  <div class="toolbar">
    <button onclick="addBlock('square')">🟦 Cuadrado</button>
    <button onclick="addBlock('circle')">⚪ Círculo</button>
    <button onclick="addBlock('diamond')">🔶 Rombo</button>
    
    <input type="color" id="color-picker" title="Color de la forma" value="#ffffff">
    
    <button onclick="startConnecting()" title="Haz clic aquí y luego en dos formas para unirlas">🔗 Conectar</button>
    <button onclick="createSchema()">📊 Plantilla Esquema</button>
    
    <button class="btn-action" onclick="saveProject()">💾 Guardar</button>
    <button class="btn-danger" onclick="backToDashboard()">🏠 Inicio</button>
  </div>
</div>

<div id="canvas">
  <svg id="svg-layer"></svg>
</div>

<script>
  // SISTEMA DE DATOS
  let appData = JSON.parse(localStorage.getItem("apuntes_v3")) || {};
  let currentUser = null;
  let currentProject = null;
  
  // VARIABLES DE LIENZO Y ESTADO
  let blocks = [];
  let connections = [];
  let connectingMode = false;
  let nodeToConnect = null;

  const loginScreen = document.getElementById("login-screen");
  const dashboardScreen = document.getElementById("dashboard-screen");
  const toolbarContainer = document.getElementById("toolbar-container");
  const canvas = document.getElementById("canvas");
  const svgLayer = document.getElementById("svg-layer");
  const projectList = document.getElementById("project-list");
  const colorPicker = document.getElementById("color-picker");

  // --- 1. CUENTAS Y DASHBOARD ---
  function login() {
    const user = document.getElementById("username").value.trim();
    if(!user) return;
    
    currentUser = user;
    if(!appData[currentUser]) appData[currentUser] = { projects: {} };
    
    loginScreen.classList.add("hidden");
    showDashboard();
  }

  function showDashboard() {
    document.getElementById("user-greeting").innerText = `Apuntes de ${currentUser}`;
    dashboardScreen.classList.remove("hidden");
    toolbarContainer.classList.add("hidden");
    canvas.style.display = "none";
    
    projectList.innerHTML = "";
    const userProjects = appData[currentUser].projects;
    
    for(let projName in userProjects) {
      let div = document.createElement("div");
      div.className = "project-card";
      div.innerText = projName;
      div.onclick = () => openProject(projName);
      projectList.appendChild(div);
    }
  }

  function createNewProject() {
    let name = prompt("Nombre del nuevo apunte:");
    if(name && !appData[currentUser].projects[name]) {
      appData[currentUser].projects[name] = { blocks: [], connections: [] };
      saveData();
      openProject(name);
    } else if (name) {
      alert("Ese nombre ya existe.");
    }
  }

  function openProject(name) {
    currentProject = name;
    dashboardScreen.classList.add("hidden");
    toolbarContainer.classList.remove("hidden");
    canvas.style.display = "block";
    loadProjectData();
  }

  function backToDashboard() {
    saveProject();
    currentProject = null;
    canvas.style.display = "none";
    showDashboard();
  }

  function logout() {
    currentUser = null;
    dashboardScreen.classList.add("hidden");
    loginScreen.classList.remove("hidden");
  }

  function saveData() {
    localStorage.setItem("apuntes_v3", JSON.stringify(appData));
  }

  // --- 2. BARRA DE HERRAMIENTAS INTELIGENTE ---
  let tbDragging = false, tbX, tbY;
  
  function toggleToolbar() {
    toolbarContainer.classList.toggle("collapsed");
  }

  document.querySelector(".drag-handle").addEventListener("mousedown", (e) => {
    tbDragging = true;
    let rect = toolbarContainer.getBoundingClientRect();
    tbX = e.clientX - rect.left;
    tbY = e.clientY - rect.top;
  });

  document.addEventListener("mousemove", (e) => {
    if(!tbDragging) return;
    
    let x = e.clientX - tbX;
    let y = e.clientY - tbY;
    
    toolbarContainer.style.left = x + "px";
    toolbarContainer.style.top = y + "px";
    toolbarContainer.style.transform = "none";

    // Detectar bordes de la pantalla para cambiar orientación
    let winW = window.innerWidth;
    let winH = window.innerHeight;
    
    if (x < winW * 0.1 || x > winW * 0.7) {
      toolbarContainer.classList.remove("horizontal");
      toolbarContainer.classList.add("vertical");
    } else {
      toolbarContainer.classList.remove("vertical");
      toolbarContainer.classList.add("horizontal");
    }
  });

  document.addEventListener("mouseup", () => tbDragging = false);

  // --- 3. LIENZO, FORMAS Y PLANTILLAS ---
  function addBlock(type, x = window.innerWidth/2, y = window.innerHeight/2, color = colorPicker.value, text = "") {
    let id = "block_" + Date.now() + Math.random();
    createDOMBlock({ id, type, x: x+"px", y: y+"px", color, text });
  }

  function createDOMBlock(data) {
    let el = document.createElement("div");
    el.className = `block ${data.type}`;
    el.id = data.id;
    el.dataset.type = data.type;
    el.style.left = data.x;
    el.style.top = data.y;
    el.style.backgroundColor = data.color || "#ffffff";
    
    el.innerHTML = `<textarea placeholder="Escribir...">${data.text || ""}</textarea>`;
    
    // Eliminar con click derecho
    el.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      if(confirm("¿Borrar este elemento?")) {
        // Borrar bloque y sus conexiones
        connections = connections.filter(c => c.from !== el.id && c.to !== el.id);
        el.remove();
        drawLines();
      }
    });

    // Lógica para conectar
    el.addEventListener("click", (e) => {
      if(connectingMode) {
        if(!nodeToConnect) {
          nodeToConnect = el.id;
          el.classList.add("connecting-mode");
        } else if (nodeToConnect !== el.id) {
          connections.push({ from: nodeToConnect, to: el.id });
          document.getElementById(nodeToConnect).classList.remove("connecting-mode");
          nodeToConnect = null;
          connectingMode = false;
          drawLines();
        }
      }
    });

    makeDraggable(el);
    canvas.appendChild(el);
  }

  // Plantilla de Organización (Modo Esquema)
  function createSchema() {
    let centerX = window.innerWidth / 2;
    let topY = 150;
    
    let mainId = "block_" + Date.now();
    createDOMBlock({ id: mainId, type: "square", x: centerX - 60 + "px", y: topY + "px", color: "#ffd6e0", text: "Tema Principal" });
    
    // Crear 3 sub-temas
    for(let i = 0; i < 3; i++) {
      let subId = "block_" + Date.now() + i;
      let subX = centerX - 250 + (i * 200);
      createDOMBlock({ id: subId, type: "circle", x: subX + "px", y: topY + 150 + "px", color: "#e0c3fc", text: `Subtema ${i+1}` });
      connections.push({ from: mainId, to: subId });
    }
    drawLines();
  }

  // --- 4. ARRASTRE Y CONECTORES (Líneas) ---
  function makeDraggable(el) {
    let ox, oy, isDragging = false;
    
    el.addEventListener("mousedown", (e) => {
      if(e.target.tagName === "TEXTAREA" || connectingMode) return;
      isDragging = true;
      ox = e.clientX - el.offsetLeft;
      oy = e.clientY - el.offsetTop;
      document.querySelectorAll(".block").forEach(b => b.style.zIndex = 1);
      el.style.zIndex = 2;
    });

    document.addEventListener("mousemove", (e) => {
      if(!isDragging) return;
      el.style.left = (e.clientX - ox) + "px";
      el.style.top = (e.clientY - oy) + "px";
      drawLines(); // Actualizar líneas al mover
    });

    document.addEventListener("mouseup", () => isDragging = false);
  }

  function startConnecting() {
    connectingMode = true;
    nodeToConnect = null;
    alert("Haz clic en la primera forma, y luego en la forma a la que quieres unirla.");
  }

  function drawLines() {
    svgLayer.innerHTML = ""; // Limpiar líneas
    connections.forEach(conn => {
      let el1 = document.getElementById(conn.from);
      let el2 = document.getElementById(conn.to);
      if(el1 && el2) {
        // Calcular centros de los bloques
        let rect1 = el1.getBoundingClientRect();
        let rect2 = el2.getBoundingClientRect();
        let x1 = rect1.left + rect1.width / 2;
        let y1 = rect1.top + rect1.height / 2;
        let x2 = rect2.left + rect2.width / 2;
        let y2 = rect2.top + rect2.height / 2;

        let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1); line.setAttribute("y1", y1);
        line.setAttribute("x2", x2); line.setAttribute("y2", y2);
        line.setAttribute("stroke", "#555");
        line.setAttribute("stroke-width", "3");
        svgLayer.appendChild(line);
      }
    });
  }

  // --- 5. GUARDAR Y CARGAR ---
  function saveProject() {
    if(!currentProject) return;
    let blocksData = [];
    document.querySelectorAll(".block").forEach(el => {
      blocksData.push({
        id: el.id, type: el.dataset.type,
        x: el.style.left, y: el.style.top,
        color: el.style.backgroundColor,
        text: el.querySelector("textarea").value
      });
    });
    
    appData[currentUser].projects[currentProject] = { blocks: blocksData, connections: connections };
    saveData();
  }

  function loadProjectData() {
    canvas.innerHTML = '<svg id="svg-layer"></svg>'; // Reset canvas
    connections = []; // Reset conexiones locales
    
    let projData = appData[currentUser].projects[currentProject];
    if(projData && projData.blocks) {
      projData.blocks.forEach(createDOMBlock);
      connections = projData.connections || [];
      // Pequeño retraso para que el DOM se renderice antes de calcular el tamaño para las líneas
      setTimeout(drawLines, 50); 
    }
  }

  // Auto-login si ya había sesión en este dispositivo (Opcional, mejora UX)
  window.onload = () => {
    // Si quisieras que recuerde al último usuario, podrías guardarlo en otra variable de localStorage.
    // Por ahora, siempre inicia en la pantalla de "Cuentas".
  };
</script>
</body>
</html>
