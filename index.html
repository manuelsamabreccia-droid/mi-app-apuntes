<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apuntes - Flow Notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
:root{--bg-app:#f5f7fa;--bg-box:#ffffff;--text-main:#333333;--border-color:rgba(0,0,0,0.08);--bg-word-bar:#eaeaea;}
body.dark-mode{--bg-app:#121216;--bg-box:#1e1f29;--text-main:#f5f7fa;--border-color:rgba(255,255,255,0.1);--bg-word-bar:#2a2b36;}
body{margin:0;padding:0;background:var(--bg-app);overflow:hidden;font-family:'Segoe UI',sans-serif;user-select:none;transition:background .3s;color:var(--text-main);}
.hidden{display:none!important;}
.screen{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(15px);display:flex;align-items:center;justify-content:center;z-index:9000;}
.auth-box{background:var(--bg-box);padding:40px;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.3);text-align:center;width:340px;color:var(--text-main);border:1px solid var(--border-color);}
.auth-box h2{margin-top:0;font-size:26px;font-weight:700;}
.auth-box input{width:100%;padding:12px 16px;margin:10px 0;border:1px solid var(--border-color);background:var(--bg-app);color:var(--text-main);border-radius:10px;box-sizing:border-box;outline:none;font-size:13px;}
.auth-box button{width:100%;padding:14px;border:none;background:#2196F3;color:#fff;font-weight:700;border-radius:10px;cursor:pointer;font-size:14px;transition:.2s;}
.auth-box button:hover{opacity:.9;}
.project-list{max-height:160px;overflow-y:auto;margin:15px 0;padding:0;list-style:none;}
.project-item{padding:11px 14px;background:var(--bg-app);margin-bottom:5px;border-radius:8px;cursor:pointer;text-align:left;font-size:13px;font-weight:600;color:var(--text-main);border:1px solid var(--border-color);}
.project-item:hover{border-color:#2196F3;}
.pi-actions{display:flex;gap:6px;}
.pi-btn{padding:4px 9px;border:1px solid var(--border-color);background:var(--bg-box);color:var(--text-main);border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;}
.pi-btn:hover{background:#2196F3;color:#fff;border-color:#2196F3;}
.pi-btn.del:hover{background:#f44336;border-color:#f44336;}
#saved-accounts-list{max-height:120px;overflow-y:auto;margin:10px 0;padding:0;list-style:none;}
.saved-account-item{padding:10px 14px;background:var(--bg-app);margin-bottom:5px;border-radius:8px;cursor:pointer;text-align:left;font-size:13px;font-weight:600;color:var(--text-main);border:1px solid var(--border-color);}
.saved-account-item:hover{border-color:#2196F3;}
.acc-badge{font-size:10px;background:#2196F3;color:#fff;padding:2px 7px;border-radius:20px;}

#toolbar{position:fixed;top:15px;left:50%;transform:translateX(-50%);background:var(--bg-box);padding:8px 16px;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);z-index:100;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{padding:8px 14px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;color:var(--text-main);display:flex;align-items:center;gap:6px;transition:.2s;}
.btn:hover{background:rgba(128,128,128,.15);}
.btn-active{background:#2196F3!important;color:#fff!important;}
.sep{width:1px;height:20px;background:var(--border-color);margin:0 2px;}

#ctx{position:fixed;background:var(--bg-box);border-radius:12px;box-shadow:0 10px 35px rgba(0,0,0,.2);border:1px solid var(--border-color);display:none;flex-direction:column;padding:6px 0;z-index:9999;}
#ctx .mi{padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
#ctx .mi:hover{background:rgba(128,128,128,.15);}
#ctx select,#ctx input[type=color]{padding:3px;font-size:12px;max-width:95px;background:var(--bg-app);color:var(--text-main);border:1px solid var(--border-color);border-radius:4px;}
.dv{height:1px;background:var(--border-color);margin:6px 0;}

#main-canvas-wrap{position:fixed;inset:0;top:60px;background:var(--bg-app);}
#flowCanvas{display:block;}

.bot-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg-box);border:1px solid var(--border-color);border-radius:12px;padding:8px 14px;display:none;gap:10px;align-items:center;z-index:100;}
.bot-bar.vis{display:flex;}
.cob{padding:7px 13px;border:1px solid var(--border-color);background:transparent;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-main);transition:.2s;}
.cob:hover,.cob.act{background:#2196F3;color:#fff;border-color:#2196F3;}
.cob.cancel{color:red;border-color:red;}
.cob.cancel:hover{background:#f44336;color:#fff;}

#toast{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:#2196F3;color:#fff;padding:12px 28px;border-radius:30px;font-weight:700;box-shadow:0 8px 20px rgba(33,150,243,.3);z-index:8000;pointer-events:none;}

#dark-toggle-btn{position:fixed;top:15px;right:15px;z-index:9999;background:var(--bg-box);border:1px solid var(--border-color);padding:11px;border-radius:50%;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:.2s;}
#dark-toggle-btn:hover{background:#2196F3;color:#fff;}

#zoom-indicator{position:fixed;bottom:15px;right:110px;background:rgba(0,0,0,.55);color:#fff;padding:5px 11px;border-radius:6px;font-size:12px;font-weight:700;pointer-events:none;z-index:50;}

#btn-center{position:fixed;bottom:15px;right:60px;background:var(--bg-box);border:1px solid var(--border-color);padding:10px;border-radius:50%;cursor:pointer;font-size:15px;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:.2s;}
#btn-center:hover{background:#2196F3;color:#fff;}

#connect-mode-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg-box);border:1px solid var(--border-color);border-radius:12px;padding:8px 14px;display:none;gap:10px;align-items:center;z-index:100;}
#connect-mode-bar.vis{display:flex;}
#connect-status{font-size:12px;font-weight:700;color:#ff9800;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

body.connecting *{cursor:crosshair!important;}
body.panning{cursor:grabbing!important;}
</style>
</head>
<body>

<button id="dark-toggle-btn" onclick="toggleDarkMode()">🌙</button>
<button id="btn-center" onclick="centerCanvas()" title="Volver al centro">⌖</button>
<div id="zoom-indicator">100%</div>
<div id="toast">💾 ¡Guardado!</div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen">
  <div class="auth-box" id="login-step">
    <h2 id="auth-title">Flow Notes</h2>
    <div id="saved-accounts-section" class="hidden">
      <p style="font-size:12px;opacity:.6;margin:0 0 6px;">Cuentas guardadas:</p>
      <ul id="saved-accounts-list"></ul>
      <div class="dv" style="margin:12px 0;"></div>
    </div>
    <input type="text" id="username" placeholder="Nombre de usuario">
    <input type="password" id="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')handleAuthAction()">
    <button id="auth-submit-btn" onclick="handleAuthAction()">Ingresar</button>
    <p id="auth-toggle-text" style="font-size:13px;margin:15px 0 0;cursor:pointer;color:#2196F3;font-weight:600;" onclick="toggleAuthMode()">¿No tienes cuenta? Regístrate aquí</p>
  </div>
  <div class="auth-box hidden" id="project-step">
    <h2 style="margin-bottom:4px;">Tus Cuadernos</h2>
    <p id="welcome-text" style="margin:0 0 15px;font-size:12px;opacity:.6;font-weight:500;"></p>
    <ul class="project-list" id="project-list-container"></ul>
    <input type="text" id="new-project-name" placeholder="Nombre del cuaderno..." onkeydown="if(event.key==='Enter')handleCreateProject()">
    <button onclick="handleCreateProject()">+ Crear Nuevo Cuaderno</button>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar" class="hidden">
  <button class="btn" onclick="addNode()">➕ Agregar Nota</button>
  <button class="btn" id="btn-connect" onclick="toggleConnectMode()">🔗 Conectar</button>
  <button class="btn" id="btn-arrow" onclick="addArrow()">→ Flecha</button>
  <div class="sep"></div>
  <button class="btn" onclick="saveToDatabase()" style="background:#4CAF50;color:#fff;">💾 Guardar</button>
  <button class="btn" onclick="exitToWorkspace()" style="background:#f44336;color:#fff;">🏠 Salir</button>
</div>

<!-- CONNECT MODE BAR -->
<div id="connect-mode-bar">
  <span id="connect-status">Seleccioná origen...</span>
  <button class="cob" onclick="cancelConnect()">✕ Cancelar</button>
</div>

<!-- CONTEXT MENU -->
<div id="ctx">
  <div class="mi" onclick="deleteNode()" style="color:red;font-weight:700;">🗑️ Eliminar</div>
  <div class="mi" onclick="indentNode()" style="color:#2196F3;font-weight:600;">→ Indentar</div>
  <div class="mi" onclick="unindentNode()" style="color:#2196F3;font-weight:600;">← Desaindentar</div>
  <div class="dv"></div>
  <div class="mi"><span>Color</span><input type="color" id="node-color" onchange="updateNodeColor(this.value)"></div>
  <div class="mi"><span>Tamaño texto</span>
    <select onchange="updateNodeFontSize(parseInt(this.value))">
      <option value="12">12px</option>
      <option value="14" selected>14px</option>
      <option value="16">16px</option>
      <option value="18">18px</option>
    </select>
  </div>
</div>

<!-- CANVAS CONTAINER -->
<div id="main-canvas-wrap">
  <canvas id="flowCanvas"></canvas>
</div>

<script>
// ═══════════ STATE ═══════════
let db = JSON.parse(localStorage.getItem("apuntes_v12_db")||localStorage.getItem("apuntes_v11_db")||localStorage.getItem("apuntes_v10_db")) || {users:{}};
let currentUser = null, currentProject = null;
let flowCanvas = null;
let flowNodes = [];
let flowConnections = [];
let connectMode = false;
let connectSource = null;
let selectedNode = null;
let isDragging = false;
let lastPos = null;
const INDENT_WIDTH = 40;

// ═══════════ INIT ═══════════
window.onload = function(){
  document.addEventListener('contextmenu', e => e.preventDefault(), true);
  if(localStorage.getItem("dark_mode_enabled") === "true") toggleDarkMode(true);
  checkAutoLogin();
  setInterval(() => {if(currentProject) saveToDatabase(true);}, 30000);
};

window.addEventListener('resize', () => {
  if(flowCanvas) {
    let wrap = document.getElementById('main-canvas-wrap');
    flowCanvas.setWidth(wrap.offsetWidth);
    flowCanvas.setHeight(wrap.offsetHeight);
    flowCanvas.renderAll();
  }
});

// ═══════════ CANVAS INIT ═══════════
function initFlowCanvas(){
  let wrap = document.getElementById('main-canvas-wrap');
  let isDark = document.body.classList.contains('dark-mode');
  
  flowCanvas = new fabric.Canvas('flowCanvas', {
    width: wrap.offsetWidth,
    height: wrap.offsetHeight,
    backgroundColor: isDark ? '#121216' : '#f5f7fa',
    fireRightClick: true,
    stopContextMenu: true,
    selection: false
  });

  // Double click para agregar nodo
  flowCanvas.on('mouse:dblclick', function(opt){
    if(connectMode) return;
    let ptr = flowCanvas.getPointer(opt.e);
    addNodeAt(ptr.x, ptr.y);
  });

  // Mouse down
  flowCanvas.on('mouse:down', function(opt){
    let evt = opt.e;
    let btn = evt.button;

    // Right click - context menu
    if(btn === 2){
      evt.preventDefault();
      let target = opt.target;
      if(target && target._isFlowNode){
        selectedNode = target;
        showCtx(evt);
      }
      return;
    }

    // Connect mode
    if(connectMode){
      let target = opt.target;
      if(target && target._isFlowNode){
        if(!connectSource){
          connectSource = target;
          connectSource.set('shadow', new fabric.Shadow({color:'#ff9800', blur:16, offsetX:0, offsetY:0}));
          document.getElementById('connect-status').innerText = `Origen: "${target.text.substring(0,15)}" → click destino`;
          flowCanvas.renderAll();
        } else if(connectSource !== target){
          connectSource.set('shadow', null);
          createConnection(connectSource, target);
          connectSource = null;
          document.getElementById('connect-status').innerText = 'Seleccioná origen...';
          flowCanvas.renderAll();
        }
      }
      return;
    }

    // Drag mode
    let target = opt.target;
    if(target && target._isFlowNode){
      selectedNode = target;
    } else if(!target){
      isDragging = true;
      lastPos = {x: evt.clientX, y: evt.clientY};
      document.body.classList.add('panning');
    }
  });

  // Mouse move
  flowCanvas.on('mouse:move', function(opt){
    let evt = opt.e;
    if(isDragging && lastPos){
      let vpt = flowCanvas.viewportTransform;
      vpt[4] += (evt.clientX - lastPos.x);
      vpt[5] += (evt.clientY - lastPos.y);
      flowCanvas.requestRenderAll();
      lastPos = {x: evt.clientX, y: evt.clientY};
      updateConnections();
    }
  });

  // Mouse up
  flowCanvas.on('mouse:up', function(){
    isDragging = false;
    lastPos = null;
    document.body.classList.remove('panning');
  });

  // Wheel zoom
  flowCanvas.on('mouse:wheel', function(opt){
    let d = opt.e.deltaY;
    let z = flowCanvas.getZoom();
    z *= 0.999**d;
    if(z > 4) z = 4;
    if(z < 0.2) z = 0.2;
    flowCanvas.zoomToPoint({x: opt.e.offsetX, y: opt.e.offsetY}, z);
    opt.e.preventDefault();
    opt.e.stopPropagation();
    updateZoomUI();
    updateConnections();
  });

  // Object events
  flowCanvas.on('object:moving', () => updateConnections());
  flowCanvas.on('object:modified', () => saveFlowNotes());

  loadFlowNotes();
}

// ═══════════ NODES ═══════════
function addNode(){
  let vpt = flowCanvas.viewportTransform;
  let x = (flowCanvas.getWidth()/2 - vpt[4]) / vpt[0];
  let y = (flowCanvas.getHeight()/2 - vpt[5]) / vpt[3];
  addNodeAt(x, y);
}

function addNodeAt(x, y, text = '', indent = 0){
  let isDark = document.body.classList.contains('dark-mode');
  
  // Background
  let bgRect = new fabric.Rect({
    left: x, top: y,
    width: 200 + (indent * INDENT_WIDTH),
    height: 50,
    fill: isDark ? '#2a2b3e' : '#ffffff',
    stroke: isDark ? 'rgba(33,150,243,0.5)' : 'rgba(33,150,243,0.4)',
    strokeWidth: 1.5,
    rx: 8, ry: 8,
    originX: 'center', originY: 'center',
    selectable: false, evented: false,
    _isBg: true
  });

  // Text
  let textObj = new fabric.Textbox(text || 'Escribí aquí...', {
    left: x, top: y,
    width: 180 + (indent * INDENT_WIDTH),
    fontSize: 14,
    fontFamily: 'Segoe UI',
    fill: isDark ? '#f0f0f0' : '#222',
    textAlign: 'left',
    originX: 'center', originY: 'center',
    selectable: true, evented: true,
    _isFlowNode: true,
    _nodeId: 'n_' + Date.now() + Math.random(),
    _indent: indent,
    _bgRect: bgRect
  });

  flowCanvas.add(bgRect);
  flowCanvas.add(textObj);
  flowNodes.push(textObj);

  // Events
  textObj.on('editing:exited', () => {
    if(!textObj.text.trim()){
      flowCanvas.remove(bgRect);
      flowCanvas.remove(textObj);
      flowNodes = flowNodes.filter(n => n !== textObj);
      flowConnections = flowConnections.filter(c => c.from !== textObj._nodeId && c.to !== textObj._nodeId);
      flowCanvas.renderAll();
      return;
    }
    adjustBg();
    saveFlowNotes();
  });

  textObj.on('changed', () => adjustBg());
  textObj.on('moving', () => {
    bgRect.set({left: textObj.left, top: textObj.top});
    bgRect.setCoords();
    updateConnections();
  });

  function adjustBg(){
    let tH = textObj.calcTextHeight ? textObj.calcTextHeight() : textObj.height;
    bgRect.set({
      width: Math.max(200 + (indent * INDENT_WIDTH), textObj.width + 20),
      height: Math.max(50, tH + 20),
      left: textObj.left,
      top: textObj.top
    });
    bgRect.setCoords();
    flowCanvas.renderAll();
  }

  flowCanvas.setActiveObject(textObj);
  if(!text || text === ''){
    setTimeout(() => {textObj.enterEditing(); textObj.selectAll();}, 50);
  }
  flowCanvas.renderAll();
  return textObj;
}

// ═══════════ CONNECTIONS ═══════════
function createConnection(from, to){
  let conn = {
    from: from._nodeId,
    to: to._nodeId,
    fromObj: from,
    toObj: to,
    lines: []
  };

  let p1 = {x: from.left, y: from.top};
  let p2 = {x: to.left, y: to.top};

  // Main line
  let line = new fabric.Line([p1.x, p1.y, p2.x, p2.y], {
    stroke: '#2196F3',
    strokeWidth: 2.5,
    selectable: false,
    evented: false,
    _isConn: true
  });

  // Arrow
  let angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
  let arrow = new fabric.Triangle({
    width: 12,
    height: 14,
    fill: '#2196F3',
    left: p2.x,
    top: p2.y,
    angle: angle * 180 / Math.PI + 90,
    originX: 'center', originY: 'center',
    selectable: false, evented: false,
    _isConn: true
  });

  flowCanvas.add(line);
  flowCanvas.add(arrow);
  flowCanvas.sendToBack(line);

  conn.lines = [line, arrow];
  flowConnections.push(conn);
  flowCanvas.renderAll();
  saveFlowNotes();
}

function updateConnections(){
  flowConnections.forEach(conn => {
    if(!conn.fromObj || !conn.toObj) return;

    let p1 = {x: conn.fromObj.left, y: conn.fromObj.top};
    let p2 = {x: conn.toObj.left, y: conn.toObj.top};

    conn.lines[0].set({x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y});

    let angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
    conn.lines[1].set({left: p2.x, top: p2.y, angle: angle * 180 / Math.PI + 90});

    conn.lines[0].setCoords();
    conn.lines[1].setCoords();
  });
  flowCanvas.renderAll();
}

// ═══════════ EDIT NODES ═══════════
function deleteNode(){
  if(!selectedNode) return;
  let bgRect = selectedNode._bgRect;
  if(bgRect) flowCanvas.remove(bgRect);
  flowCanvas.remove(selectedNode);
  flowNodes = flowNodes.filter(n => n !== selectedNode);
  flowConnections = flowConnections.filter(c => c.from !== selectedNode._nodeId && c.to !== selectedNode._nodeId);
  selectedNode = null;
  document.getElementById('ctx').style.display = 'none';
  flowCanvas.renderAll();
  saveFlowNotes();
}

function indentNode(){
  if(!selectedNode) return;
  selectedNode._indent = (selectedNode._indent || 0) + 1;
  let newW = 200 + (selectedNode._indent * INDENT_WIDTH);
  selectedNode._bgRect.set({width: newW});
  selectedNode.set({width: newW - 20});
  flowCanvas.renderAll();
  saveFlowNotes();
}

function unindentNode(){
  if(!selectedNode) return;
  if(selectedNode._indent > 0){
    selectedNode._indent--;
    let newW = 200 + (selectedNode._indent * INDENT_WIDTH);
    selectedNode._bgRect.set({width: newW});
    selectedNode.set({width: newW - 20});
    flowCanvas.renderAll();
    saveFlowNotes();
  }
}

function updateNodeColor(color){
  if(!selectedNode) return;
  selectedNode._bgRect.set({fill: color});
  flowCanvas.renderAll();
  saveFlowNotes();
}

function updateNodeFontSize(size){
  if(!selectedNode) return;
  selectedNode.set({fontSize: size});
  flowCanvas.renderAll();
  saveFlowNotes();
}

// ═══════════ CONNECT MODE ═══════════
function toggleConnectMode(){
  connectMode = !connectMode;
  document.getElementById('btn-connect').classList.toggle('btn-active', connectMode);
  document.getElementById('connect-mode-bar').classList.toggle('vis', connectMode);
  document.body.classList.toggle('connecting', connectMode);
  if(connectMode){
    document.getElementById('connect-status').innerText = 'Seleccioná origen...';
  }
}

function cancelConnect(){
  connectMode = false;
  if(connectSource){
    connectSource.set('shadow', null);
    connectSource = null;
  }
  document.getElementById('btn-connect').classList.remove('btn-active');
  document.getElementById('connect-mode-bar').classList.remove('vis');
  document.body.classList.remove('connecting');
  flowCanvas.renderAll();
}

// ═══════════ ARROW TOOL ═══════════
function addArrow(){
  alert('Pendiente: Herramienta de flecha libre. Por ahora usa "Conectar" para flechas entre notas.');
}

// ═══════════ SAVE/LOAD ═══════════
function saveFlowNotes(){
  if(!currentProject || !flowCanvas) return;

  let data = {
    nodes: flowNodes.map(n => ({
      id: n._nodeId,
      text: n.text,
      x: n.left,
      y: n.top,
      indent: n._indent || 0,
      fontSize: n.fontSize,
      bgFill: n._bgRect.fill
    })),
    connections: flowConnections.map(c => ({
      from: c.from,
      to: c.to
    }))
  };

  if(db.users[currentUser] && db.users[currentUser].projects[currentProject]){
    db.users[currentUser].projects[currentProject].flowNotes = data;
    saveDB();
  }
}

function loadFlowNotes(){
  if(!currentProject) return;
  let proj = db.users[currentUser].projects[currentProject];
  if(!proj || !proj.flowNotes) return;

  let data = proj.flowNotes;
  let nodeMap = {};

  (data.nodes || []).forEach(n => {
    let node = addNodeAt(n.x, n.y, n.text, n.indent);
    node._nodeId = n.id;
    if(n.fontSize) node.set({fontSize: n.fontSize});
    if(n.bgFill) node._bgRect.set({fill: n.bgFill});
    nodeMap[n.id] = node;
  });

  setTimeout(() => {
    (data.connections || []).forEach(c => {
      let from = nodeMap[c.from];
      let to = nodeMap[c.to];
      if(from && to){
        createConnection(from, to);
      }
    });
    flowCanvas.renderAll();
  }, 100);
}

// ═══════════ ZOOM & PAN ═══════════
function centerCanvas(){
  flowCanvas.setViewportTransform([1, 0, 0, 1, 0, 0]);
  updateConnections();
  updateZoomUI();
}

function updateZoomUI(){
  document.getElementById('zoom-indicator').innerText = Math.round(flowCanvas.getZoom() * 100) + '%';
}

function showCtx(evt){
  let ctx = document.getElementById('ctx');
  ctx.style.display = 'flex';
  ctx.style.left = '-9999px';
  ctx.style.top = '-9999px';
  requestAnimationFrame(() => {
    let mw = ctx.offsetWidth || 225;
    let mh = ctx.offsetHeight || 300;
    let mx = evt.clientX + mw > window.innerWidth ? evt.clientX - mw : evt.clientX;
    let my = evt.clientY + mh > window.innerHeight ? window.innerHeight - mh : evt.clientY;
    ctx.style.left = mx + 'px';
    ctx.style.top = my + 'px';
  });
}

// ═══════════ DARK MODE ═══════════
function toggleDarkMode(force = false){
  let body = document.body;
  if(!force) body.classList.toggle('dark-mode');
  else body.classList.add('dark-mode');
  
  let isDark = body.classList.contains('dark-mode');
  localStorage.setItem('dark_mode_enabled', isDark);
  document.getElementById('dark-toggle-btn').innerText = isDark ? '☀️' : '🌙';

  if(flowCanvas){
    let bgColor = isDark ? '#121216' : '#f5f7fa';
    flowCanvas.setBackgroundColor(bgColor, () => {
      flowNodes.forEach(n => {
        if(n._bgRect){
          let oldFill = n._bgRect.fill;
          if(isDark && oldFill === '#ffffff'){
            n._bgRect.set({fill: '#2a2b3e'});
          } else if(!isDark && oldFill === '#2a2b3e'){
            n._bgRect.set({fill: '#ffffff'});
          }
        }
        if(isDark && n.fill === '#222'){
          n.set({fill: '#f0f0f0'});
        } else if(!isDark && n.fill === '#f0f0f0'){
          n.set({fill: '#222'});
        }
      });
      flowCanvas.renderAll();
    });
  }
}

// ═══════════ AUTH ═══════════
function checkAutoLogin(){
  let savedLogin = localStorage.getItem('apuntes_autologin');
  let savedProject = localStorage.getItem('apuntes_last_project');
  
  if(savedLogin && db.users[savedLogin]){
    currentUser = savedLogin;
    if(savedProject && db.users[savedLogin].projects && db.users[savedLogin].projects[savedProject]){
      currentProject = savedProject;
      openProjectCanvas();
      return;
    }
    showProjectWorkspace();
  }
  renderSavedAccountsUI();
}

function renderSavedAccountsUI(){
  let users = Object.keys(db.users);
  let sec = document.getElementById('saved-accounts-section');
  let list = document.getElementById('saved-accounts-list');
  list.innerHTML = '';
  if(!users.length){sec.classList.add('hidden'); return;}
  sec.classList.remove('hidden');
  
  users.forEach(u => {
    let li = document.createElement('li');
    li.className = 'saved-account-item';
    let hasToken = localStorage.getItem('apuntes_autologin') === u;
    li.innerHTML = `<span>👤 ${u}</span><span class="acc-badge" style="${hasToken?'background:#4CAF50':''}">${hasToken?'Este dispositivo':'Guardado'}</span>`;
    li.onclick = () => {
      if(hasToken){
        currentUser = u;
        showProjectWorkspace();
      }
    };
    list.appendChild(li);
  });
}

function toggleAuthMode(){
  let isLogin = document.getElementById('auth-title').innerText === 'Flow Notes';
  document.getElementById('auth-title').innerText = isLogin ? 'Crear Cuenta Nueva' : 'Flow Notes';
  document.getElementById('auth-submit-btn').innerText = isLogin ? 'Registrarse' : 'Ingresar';
  document.getElementById('auth-toggle-text').innerText = isLogin ? '¿Ya tienes cuenta? Ingresa aquí' : '¿No tienes cuenta? Regístrate aquí';
}

function handleAuthAction(){
  let u = document.getElementById('username').value.trim();
  let p = document.getElementById('password').value.trim();
  if(!u || !p) return alert('Completá todos los campos.');
  
  let isLogin = document.getElementById('auth-title').innerText === 'Flow Notes';
  
  if(isLogin){
    if(!db.users[u]) return alert('El usuario no existe.');
    if(db.users[u].password !== p) return alert('Contraseña incorrecta.');
    currentUser = u;
    localStorage.setItem('apuntes_autologin', u);
    showProjectWorkspace();
  } else {
    if(db.users[u]) return alert('Usuario ya registrado.');
    db.users[u] = {password: p, projects: {}, lastOpen: null};
    saveDB();
    currentUser = u;
    localStorage.setItem('apuntes_autologin', u);
    showProjectWorkspace();
  }
}

function showProjectWorkspace(){
  document.getElementById('login-step').classList.add('hidden');
  document.getElementById('project-step').classList.remove('hidden');
  document.getElementById('welcome-text').innerText = `Conectado como: ${currentUser}`;
  renderProjectList();
}

function renderProjectList(){
  let c = document.getElementById('project-list-container');
  c.innerHTML = '';
  let projects = db.users[currentUser].projects;
  for(let n in projects){
    let li = document.createElement('li');
    li.className = 'project-item';
    let ns = document.createElement('span');
    ns.innerText = n;
    ns.style.cssText = 'flex:1;cursor:pointer;';
    li.onclick = (e) => {if(!e.target.classList.contains('pi-btn')) openProject(n);};
    
    let acts = document.createElement('div');
    acts.className = 'pi-actions';
    let rb = document.createElement('button');
    rb.className = 'pi-btn';
    rb.innerText = '✏️';
    rb.onclick = e => {e.stopPropagation(); renameProject(n);};
    let db2 = document.createElement('button');
    db2.className = 'pi-btn del';
    db2.innerText = '🗑️';
    db2.onclick = e => {e.stopPropagation(); deleteProject(n);};
    acts.appendChild(rb);
    acts.appendChild(db2);
    li.appendChild(ns);
    li.appendChild(acts);
    c.appendChild(li);
  }
}

function renameProject(old){
  let nw = prompt('Nuevo nombre:', old);
  if(!nw || nw === old) return;
  if(db.users[currentUser].projects[nw]) return alert('Ya existe ese nombre.');
  db.users[currentUser].projects[nw] = db.users[currentUser].projects[old];
  delete db.users[currentUser].projects[old];
  saveDB();
  renderProjectList();
}

function deleteProject(name){
  if(!confirm(`¿Borrar "${name}"?`)) return;
  delete db.users[currentUser].projects[name];
  saveDB();
  renderProjectList();
}

function handleCreateProject(){
  let name = document.getElementById('new-project-name').value.trim();
  if(!name) return;
  if(db.users[currentUser].projects[name]) return alert('Este cuaderno ya existe.');
  db.users[currentUser].projects[name] = {flowNotes: {nodes: [], connections: []}};
  saveDB();
  document.getElementById('new-project-name').value = '';
  renderProjectList();
}

function openProject(name){
  currentProject = name;
  db.users[currentUser].lastOpen = name;
  localStorage.setItem('apuntes_last_project', name);
  saveDB();
  openProjectCanvas();
}

function openProjectCanvas(){
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('toolbar').classList.remove('hidden');
  if(!flowCanvas) initFlowCanvas();
  loadFlowNotes();
}

function exitToWorkspace(){
  saveToDatabase();
  currentProject = null;
  localStorage.removeItem('apuntes_last_project');
  document.getElementById('toolbar').classList.add('hidden');
  cancelConnect();
  
  if(flowCanvas){
    flowCanvas.dispose();
    flowCanvas = null;
    flowNodes = [];
    flowConnections = [];
  }
  
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('login-step').classList.remove('hidden');
  document.getElementById('project-step').classList.add('hidden');
}

function saveToDatabase(silent = false){
  saveFlowNotes();
  if(!silent) showToast('💾 ¡Guardado!');
}

function saveDB(){
  localStorage.setItem('apuntes_v12_db', JSON.stringify(db));
}

function showToast(msg){
  let toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.style.display = 'block';
  setTimeout(() => {toast.style.display = 'none';}, 2000);
}

// Prevent context menu
document.addEventListener('click', e => {
  if(!document.getElementById('ctx').contains(e.target))
    document.getElementById('ctx').style.display = 'none';
});
</script>
